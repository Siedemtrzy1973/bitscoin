<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>BitsCoin</title>
  <link rel="stylesheet" href="style.css">
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: linear-gradient(to bottom right, #ffffff, #e0f7ff);
      overflow-x: hidden;
    }

    .logo {
      text-align: center;
      margin-top: 20px;
    }

    .logo img {
      max-width: 250px;
    }

    h1 {
      text-align: center;
      color: #2b2b2b;
    }

    p {
      text-align: center;
      max-width: 700px;
      margin: 20px auto;
      color: #444;
    }

    .falling {
      position: fixed;
      top: -50px;
      width: 30px;
      height: 30px;
      pointer-events: none;
      z-index: 9999;
      animation: fall linear infinite;
    }

    @keyframes fall {
      0% { transform: translateY(-50px); opacity: 1; }
      100% { transform: translateY(100vh); opacity: 0; }
    }
  </style>
</head>
<body>
  <div class="logo">
    <img src="1000007043.png" alt="BitsCoin Logo">
  </div>
  <h1>BitsCoin</h1>
  <p>BitsCoin - Decentralized Future. Bezpieczna, szybka i przyszłościowa kryptowaluta zbudowana na fundamentach wolności i innowacji.</p>

  <script>
    function createFallingCoin() {
      const coin = document.createElement('img');
      coin.src = '1000007043.png'; // Możesz tu użyć innej ikony monety BSC
      coin.classList.add('falling');
      coin.style.left = Math.random() * window.innerWidth + 'px';
      coin.style.animationDuration = (3 + Math.random() * 3) + 's';
      coin.style.opacity = Math.random();
      document.body.appendChild(coin);

      setTimeout(() => {
        document.body.removeChild(coin);
      }, 6000);
    }

    setInterval(createFallingCoin, 300);
  </script>
</body>
</html>
